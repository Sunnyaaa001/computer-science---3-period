server:
  port: 8081

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/api-platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      pool-name: MyHikariCP
      maximum-pool-size: 10
      minimum-idle: 5
      keepalive-time: 300000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 0
      connect-timeout: 5000ms
      timeout: 5000ms

      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          max-wait: -1ms
          min-idle: 2